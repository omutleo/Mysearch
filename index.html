<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База поставщиков HTec</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="login-modal" class="login-modal hidden">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-h">H</span><span class="logo-tec">Tec</span>
            </div>
            <h2 class="login-title">Вход в систему</h2>
            <form id="login-form-modal" class="login-form">
                <div class="form-group">
                    <label for="username-modal">Логин</label>
                    <input type="text" id="username-modal" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password-modal">Пароль</label>
                    <input type="password" id="password-modal" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Войти</button>
                <p id="login-error-modal" class="error-message">Неверный логин или пароль</p>
            </form>
            <p class="login-hint">Логин: <strong>admin</strong> | Пароль: у администратора</p>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="hidden">
        <!-- Header -->
        <header class="main-header">
            <div class="header-content">
                <button id="back-to-dashboard" class="btn-back hidden" title="Назад">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="brand">
                    <span class="logo-h">H</span><span class="logo-tec">Tec</span>
                </div>
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="global-search" class="search-input" placeholder="Поиск поставщиков, оборудования, контактов...">
                </div>
                <!-- Кнопка обновления данных -->
                <button id="refresh-data-btn" class="btn btn-secondary" title="Обновить данные">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button id="logout-btn" class="btn btn-secondary">Выход</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="container">
            <!-- Dashboard View -->
            <div id="dashboard-view">
                <h1 class="page-title">База поставщиков</h1>
                
                <div class="stats-bar">
                    <div class="stat-item">
                        <span id="total-suppliers" class="stat-number">0</span>
                        <span class="stat-label">Всего поставщиков</span>
                    </div>
                    <div class="stat-item">
                        <span id="total-categories" class="stat-number">0</span>
                        <span class="stat-label">Категорий</span>
                    </div>
                </div>

                <h2 class="section-title">Категории оборудования</h2>
                <div id="categories-container" class="categories-grid">
                    <!-- Категории будут добавлены здесь через JavaScript -->
                </div>
            </div>

            <!-- Category View -->
            <div id="category-view" class="hidden">
                <div class="category-header">
                    <h1 id="current-category-title" class="category-title-large">Название категории</h1>
                    <span id="current-category-count" class="category-count">0 поставщиков</span>
                </div>
                <div id="suppliers-container" class="suppliers-list">
                    <!-- Поставщики будут добавлены здесь через JavaScript -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <p>© 2024 HTec. Все права защищены.</p>
        </footer>
    </div>

    <!-- Scripts - порядок важен! -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
